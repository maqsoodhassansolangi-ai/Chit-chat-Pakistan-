<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChitChat Pakistan</title>
    
    <!-- Firebase SDKs (بالکل ویسے ہی) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <!-- ============ پرانا چیٹ کنٹینر (بالکل ویسے ہی) ============ -->
    <div id="auth-container">
        <!-- لاگ ان فارمز بالکل ویسے ہی -->
        <div id="login-form">
            <h2>ChitChat Pakistan</h2>
            <input type="email" id="login-email" placeholder="Email">
            <input type="password" id="login-password" placeholder="Password">
            <button onclick="loginForm()" class="btn-primary">Login</button>
            <button onclick="googleBtn()" class="btn-google"><i class="fab fa-google"></i> Google</button>
            <button onclick="guestBtn()" class="btn-guest">Guest Login</button>
            <p>No account? <span onclick="showSignup()" style="color:#25D366;cursor:pointer;">Sign Up</span></p>
        </div>
        <!-- سائن اپ فارم بالکل ویسے ہی -->
        <div id="signup-form" style="display:none;">
            <h2>Sign Up</h2>
            <input type="text" id="signup-name" placeholder="Full Name">
            <input type="email" id="signup-email" placeholder="Email">
            <input type="password" id="signup-password" placeholder="Password">
            <button onclick="signupForm()" class="btn-primary">Sign Up</button>
            <p>Already have account? <span onclick="showLogin()" style="color:#25D366;cursor:pointer;">Login</span></p>
        </div>
    </div>

    <!-- ============ پرانا چیٹ باکس (بالکل ویسے ہی) ============ -->
    <div id="chat-container" style="display:none;">
        <div id="chat-header">
            <h2>ChitChat Pakistan</h2>
            <div id="online-count"><i class="fas fa-circle" style="color:#25D366;"></i> <span id="online-count-text">0</span> Online</div>
            <button onclick="logoutBtn()" class="btn-logout">Logout</button>
        </div>

        <!-- ============ نیا مینیو بار (صرف نیا شامل کیا گیا) ============ -->
        <div id="menu-bar">
            <div class="menu-item" onclick="showRoomsList()" style="cursor:pointer;">
                <i class="fas fa-home"></i> Home
            </div>
            <div class="menu-item dropdown">
                <i class="fas fa-folder"></i> Rooms <i class="fas fa-caret-down"></i>
                <div class="dropdown-content">
                    <a href="#" onclick="showAllRooms()">📋 All Rooms</a>
                    <a href="#" onclick="openCreateRoomModal()">➕ Create New Room</a>
                </div>
            </div>
            <div class="menu-item" onclick="showMyRooms()" style="cursor:pointer;">
                <i class="fas fa-lock"></i> My Rooms
            </div>
            <div class="menu-item" style="cursor:pointer;">
                <i class="fas fa-user"></i> Profile
            </div>
        </div>

        <!-- ============ نیا رومز لسٹ ایریا (جہاں رومز نظر آئیں گے) ============ -->
        <div id="rooms-list-area" style="display:block; padding:10px;">
            <h3>Available Rooms</h3>
            <div id="rooms-list">
                <!-- رومز یہاں ڈائنامک طور پر آئیں گے -->
                <p>Loading rooms...</p>
            </div>
        </div>

        <!-- ============ پرانا چیٹ باکس (بالکل ویسے ہی) ============ -->
        <div id="chat-box" style="display:none;">
            <div id="messages"></div>
        </div>

        <!-- ============ پرانا انپٹ ایریا (بالکل ویسے ہی) ============ -->
        <div id="input-area" style="display:none;">
            <input type="text" id="message-input" placeholder="Type a message...">
            <button onclick="sendMessage()" id="send-btn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <!-- ============ نیا Create Room پاپ اپ (بالکل الگ) ============ -->
    <div id="create-room-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <span class="close" onclick="closeCreateRoomModal()">&times;</span>
            <h3>Create New Room</h3>
            <input type="text" id="new-room-name" placeholder="Room Name">
            <button onclick="createRoom()" class="btn-primary">Create</button>
            <button onclick="closeCreateRoomModal()" class="btn-secondary">Cancel</button>
        </div>
    </div>

    <!-- JS -->
    <script src="js/app.js"></script>
</body>
</html>
