<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta name="description" content="ChitChat Pakistan - Free Online Chat Room">
    <meta name="google-site-verification" content="B1RI6RT1H9T8Ttg5fLtuLiNahDBa-ZOpbkWlnn9HTNk">
    <title>ChitChat Pakistan</title>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        /* ===== RESET & BASE ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #ECE5DD; height: 100vh; overflow: hidden; transition: 0.3s; }
        
        #loadingScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #075E54; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .spinner { width: 50px; height: 50px; border: 5px solid rgba(255,255,255,0.3); border-top-color: #25D366; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loadingScreen p { color: #fff; font-size: 20px; margin-top: 20px; }
        
        /* کی بورڈ کھلنے پر اس اسکرین کی ہائٹ جاوا اسکرپٹ سے لچکدار طریقے سے تبدیل ہوگی */
        #appContainer { display: none; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #mainHeader { background: #075E54; color: #fff; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; height: 60px; flex-shrink: 0; }
        .logo-text { font-size: 20px; font-weight: 700; }
        .header-right { display: flex; gap: 12px; }
        .header-right button { background: none; border: none; color: #fff; font-size: 22px; cursor: pointer; }
        .logout-btn { font-size: 14px !important; background: rgba(255,255,255,0.15) !important; padding: 6px 14px !important; border-radius: 20px !important; }

        /* ===== AUTH ===== */
        #authSection { display: flex; align-items: center; justify-content: center; flex: 1; background: linear-gradient(135deg, #075E54, #128C7E); padding: 20px; overflow-y: auto; }
        .auth-card { background: #fff; border-radius: 20px; padding: 32px 28px; max-width: 420px; width: 100%; box-shadow: 0 8px 40px rgba(0,0,0,0.15); }
        .auth-card h2 { text-align: center; color: #075E54; margin-bottom: 4px; }
        .subtitle { text-align: center; color: #666; font-size: 14px; margin-bottom: 24px; }
        
        .auth-tabs { display: flex; background: #f0f2f5; border-radius: 12px; padding: 4px; margin-bottom: 24px; }
        .tab-btn { flex: 1; border: none; background: transparent; padding: 10px 0; font-size: 14px; font-weight: 600; color: #666; cursor: pointer; border-radius: 10px; }
        .tab-btn.active { background: #fff; color: #075E54; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }

        .auth-form { display: none; flex-direction: column; gap: 16px; }
        .auth-form.active { display: flex; }
        .auth-form input { width: 100%; padding: 12px 16px; border: 1px solid #e0e0e0; border-radius: 12px; font-size: 15px; outline: none; }
        .auth-form input:focus { border-color: #075E54; }
        
        .password-wrapper { position: relative; }
        .password-wrapper input { padding-right: 44px; }
        .toggle-password { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 20px; }
        
        .form-options { display: flex; align-items: center; gap: 12px; font-size: 14px; color: #555; }
        .form-options a { color: #075E54; text-decoration: none; }

        .auth-btn { width: 100%; padding: 12px; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; margin-bottom: 10px; }
        .auth-btn.primary { background: #075E54; color: #fff; }
        .auth-btn.google { background: #fff; color: #333; border: 1px solid #dadce0; }
        .auth-btn.guest { background: #f0f2f5; color: #555; }
        
        .auth-divider { display: flex; align-items: center; text-align: center; color: #999; font-size: 13px; margin: 10px 0; }
        .auth-divider::before, .auth-divider::after { content: ''; flex: 1; border-bottom: 1px solid #e0e0e0; }
        .auth-divider::before { margin-right: 12px; }
        .auth-divider::after { margin-left: 12px; }

        #authFooter { text-align: center; padding: 16px 20px; background: #075E54; color: #fff; flex-shrink: 0; }
        .footer-links a { color: #fff; text-decoration: none; margin: 0 10px; font-size: 14px; }

        /* ===== CHAT ===== */
        #chatSection { display: none; flex: 1; flex-direction: column; background: #ECE5DD; overflow: hidden; position: relative; }
        #chatHeader { background: #075E54; color: #fff; padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        #onlineCount { font-size: 13px; opacity: 0.8; }
        
        /* میسجز کا ڈبہ جو اب ٹیکسٹ باکس سے کبھی نہیں ٹکرائے گا */
        #chatMessages { flex: 1; overflow-y: auto; padding: 16px 12px; display: flex; flex-direction: column; gap: 4px; padding-bottom: 16px !important; }
        .message-bubble { max-width: 75%; padding: 8px 12px; border-radius: 8px; margin-bottom: 4px; word-wrap: break-word; font-size: 15px; }
        .message-bubble.sent { align-self: flex-end; background: #DCF8C6; border-top-right-radius: 0; }
        .message-bubble.received { align-self: flex-start; background: #fff; border-top-left-radius: 0; }
        .sender-name { display: block; font-size: 12px; font-weight: 600; color: #075E54; margin-bottom: 2px; }
        .message-time { display: block; font-size: 10px; color: #888; text-align: right; margin-top: 2px; }

        /* پوزیشن فکسڈ ختم: اب یہ میسجز کے نیچے فلو کرے گا اور میسجز کو اوپر دھکیلے گا */
        #chatInputArea { background: #fff; padding: 10px 14px; padding-bottom: max(10px, env(safe-area-inset-bottom)); display: flex; align-items: center; gap: 10px; border-top: 1px solid #e0e0e0; flex-shrink: 0; width: 100%; }
        #chatInputArea input { flex: 1; border: none; background: #f0f2f5; padding: 10px 16px; border-radius: 24px; font-size: 15px; outline: none; }
        #sendMessageBtn { background: #075E54; border: none; color: #fff; width: 44px; height: 44px; border-radius: 50%; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

        /* ===== DARK MODE ===== */
        body.dark-mode { background: #111B21; }
        body.dark-mode #chatSection { background: #0b141a; }
        body.dark-mode #chatMessages { background: #0b141a; }
        body.dark-mode .message-bubble.sent { background: #005C4B; color: #e9edef; }
        body.dark-mode .message-bubble.received { background: #202C33; color: #e9edef; }
        body.dark-mode #chatInputArea { background: #202C33; border-top-color: #2a3942; }
        body.dark-mode #chatInputArea input { background: #2a3942; color: #e9edef; }
        body.dark-mode .auth-card { background: #202C33; color: #e9edef; }
        body.dark-mode .auth-card h2 { color: #25D366; }
        body.dark-mode .auth-btn.primary { background: #25D366; color: #111B21; }
        body.dark-mode #authFooter { background: #0b141a; }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) { .message-bubble { max-width: 85%; font-size: 14px; } }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loadingScreen">
        <div class="spinner"></div>
        <p>ChitChat Pakistan</p>
    </div>

    <!-- Main Container -->
    <div id="appContainer" style="display:none;">
        <header id="mainHeader">
            <div class="header-left"><span class="logo-text">💬 ChitChat</span></div>
            <div class="header-right">
                <button id="themeToggle">🌙</button>
                <button id="logoutBtn" class="logout-btn" style="display:none;">Logout</button>
            </div>
        </header>

        <!-- Auth Section -->
        <div id="authSection">
            <div class="auth-card">
                <h2>ChitChat Pakistan</h2>
                <p class="subtitle">وہاں جہاں دوستی اور باتیں پروان چڑھتی ہیں</p>
                <div class="auth-tabs">
                    <button class="tab-btn active" data-tab="login">Sign In</button>
                    <button class="tab-btn" data-tab="signup">Sign Up</button>
                </div>
                <form id="loginForm" class="auth-form active">
                    <input type="email" id="loginEmail" placeholder="Email" required>
                    <div class="password-wrapper">
                        <input type="password" id="loginPassword" placeholder="Password" required>
                        <span class="toggle-password" data-target="loginPassword">👁️</span>
                    </div>
                    <div class="form-options"><label><input type="checkbox" id="rememberMe"> Remember Me</label></div>
                    <button type="submit" class="auth-btn primary">Sign In</button>
                </form>
                <form id="signupForm" class="auth-form">
                    <input type="email" id="signupEmail" placeholder="Email" required>
                    <div class="password-wrapper">
                        <input type="password" id="signupPassword" placeholder="Password (min 6 chars)" required>
                        <span class="toggle-password" data-target="signupPassword">👁️</span>
                    </div>
                    <div class="form-options"><label><input type="checkbox" id="termsCheckbox" required> I agree to <a href="#">Terms</a></label></div>
                    <button type="submit" class="auth-btn primary">Sign Up</button>
                </form>
                <div class="auth-divider">or</div>
                <button id="googleSignInBtn" class="auth-btn google">Sign in with Google</button>
                <button id="guestLoginBtn" class="auth-btn guest">Continue as Guest</button>
            </div>
        </div>

        <!-- Chat Section -->
        <div id="chatSection">
            <div id="chatHeader">
                <div><h3># Public Room</h3><span id="onlineCount">🟢 0 online</span></div>
            </div>
            <div id="chatMessages"></div>
            <div id="chatInputArea">
                <input type="text" id="messageInput" placeholder="Type a message..." maxlength="500">
                <button id="sendMessageBtn">➤</button>
            </div>
        </div>

        <!-- Footer -->
        <footer id="authFooter">
            <div class="footer-links">
                <a href="#">Terms</a> <a href="#">Privacy</a> <a href="#">Rules</a>
            </div>
            <p style="font-size:12px; opacity:0.6;">© 2026 ChitChat Pakistan</p>
        </footer>
    </div>

    <script>
        // ============================================
        // FIREBASE CONFIG
        // ============================================
        const firebaseConfig = {
            apiKey: "AIzaSyCvCez1Hpq4gEsloecycnbKM_nuQlQVGIA",
            authDomain: "chit-chat-pakistan.firebaseapp.com",
            databaseURL: "https://chit-chat-pakistan-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "chit-chat-pakistan",
            storageBucket: "chit-chat-pakistan.firebasestorage.app",
            messagingSenderId: "740486617820",
            appId: "1:740486617820:web:a3fef5f11a5ea57526b219"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        // ============================================
        // DOM ELEMENTS & GLOBAL VARIABLES
        // ============================================
        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signupForm');
        const googleBtn = document.getElementById('googleSignInBtn');
        const guestBtn = document.getElementById('guestLoginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const authSection = document.getElementById('authSection');
        const chatSection = document.getElementById('chatSection');
        const loadingScreen = document.getElementById('loadingScreen');
        const chatMessages = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendMessageBtn');
        const onlineCount = document.getElementById('onlineCount');

        let messagesRef = database.ref('messages');
        let statusRef = database.ref('status');
        let currentUser = null;
        let listenerAttached = false;

        // ============================================
        // UI HELPERS (Auth & Tabs)
        // ============================================
        document.querySelectorAll('.toggle-password').forEach(el => {
            el.addEventListener('click', function() {
                const inp = document.getElementById(this.dataset.target);
                inp.type = inp.type === 'password' ? 'text' : 'password';
                this.textContent = inp.type === 'password' ? '👁️' : '🙈';
            });
        });

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
                document.getElementById(this.dataset.tab + 'Form').classList.add('active');
            });
        });

        signupForm.addEventListener('submit', e => {
            e.preventDefault();
            const email = document.getElementById('signupEmail').value.trim();
            const pass = document.getElementById('signupPassword').value.trim();
            if(!document.getElementById('termsCheckbox').checked) return alert('Accept Terms first');
            if(pass.length < 6) return alert('Password must be 6+ chars');
            auth.createUserWithEmailAndPassword(email, pass)
                .then(() => {
                    alert('Account created! Sign in now.');
                    document.querySelector('[data-tab="login"]').click();
                })
                .catch(err => alert(err.message));
        });

        loginForm.addEventListener('submit', e => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginPassword').value.trim();
            auth.signInWithEmailAndPassword(email, pass)
                .then(() => showChat())
                .catch(err => alert(err.message));
        });

        googleBtn.addEventListener('click', () => {
            auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())
                .then(() => showChat())
                .catch(err => alert(err.message));
        });

        guestBtn.addEventListener('click', () => {
            auth.signInAnonymously()
                .then(() => showChat())
                .catch(err => alert(err.message));
        });

        logoutBtn.addEventListener('click', () => {
            auth.signOut().then(() => showAuth());
        });

        function showChat() {
            authSection.style.display = 'none';
            chatSection.style.display = 'flex';
            logoutBtn.style.display = 'inline-block';
            document.getElementById('authFooter').style.display = 'none'; // Hide footer on active chat
            loadMessages();
            // اسکرین سائز درست کریں
            setTimeout(adjustViewport, 100);
        }

        function showAuth() {
            authSection.style.display = 'flex';
            chatSection.style.display = 'none';
            logoutBtn.style.display = 'none';
            chatMessages.innerHTML = '';
            document.getElementById('authFooter').style.display = 'block'; // Show footer on auth page
            
            if (messagesRef) {
                messagesRef.off();
            }
            listenerAttached = false;
        }

        document.getElementById('themeToggle').addEventListener('click', function() {
            document.body.classList.toggle('dark-mode');
            this.textContent = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        });
        if(localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
            document.getElementById('themeToggle').textContent = '☀️';
        }
                // ============================================
        // CHAT LOGIC WITH DYNAMIC KEYBOARD DETECTOR
        // ============================================

        auth.onAuthStateChanged(user => {
            loadingScreen.style.display = 'none';
            document.getElementById('appContainer').style.display = 'block';
            if (user) {
                currentUser = user;
                initPresence(user);
                showChat();
            } else {
                currentUser = null;
                showAuth();
            }
        });

        // Presence Logic
        function initPresence(user) {
            const userStatusRef = statusRef.child(user.uid);
            database.ref('.info/connected').on('value', function(snapshot) {
                if (snapshot.val() === false) return;
                userStatusRef.onDisconnect().set({ state: 'offline' }).then(() => {
                    userStatusRef.set({ state: 'online' });
                });
            });

            statusRef.orderByChild('state').equalTo('online').on('value', snap => {
                onlineCount.textContent = `🟢 ${snap.numChildren()} online`;
            });
        }

        // *** SINGLE LISTENER FOR MESSAGES ***
        function loadMessages() {
            if (listenerAttached) return;
            listenerAttached = true;

            chatMessages.innerHTML = '';

            messagesRef.orderByChild('timestamp').limitToLast(50).on('child_added', snapshot => {
                const msg = snapshot.val();
                if (msg) {
                    msg.key = snapshot.key;
                    displayMessage(msg);
                }
                
                // Bulletproof Scroll to Bottom
                scrollToBottom();
            });
        }

        // Display Single Message
        function displayMessage(msg) {
            if (!msg || !msg.key) return;
            if (chatMessages.querySelector(`[data-id="${msg.key}"]`)) return;

            const div = document.createElement('div');
            const isMine = currentUser && msg.uid === currentUser.uid;
            div.className = 'message-bubble ' + (isMine ? 'sent' : 'received');
            div.dataset.id = msg.key; 

            const filteredText = filterBadWords(msg.text || '');
            const timeStr = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : 'Just now';

            div.innerHTML = `
                <span class="sender-name">${msg.name || 'Anonymous'}</span>
                <span>${filteredText}</span>
                <span class="message-time">${timeStr}</span>
            `;
            chatMessages.appendChild(div);
        }

        function filterBadWords(text) {
            const bad = ['fuck','shit','ass','bitch','cunt','bastard','damn','hell','idiot','stupid','dumb','fool','moron','loser','suck','crap','piss','dick','pussy','whore','slut','gand','bhosda','chut','loda','landa','bhenchod','madarchod','kutta','suar','nalayak','bewaqoof','chutiya','gadha','ullu','bakwas'];
            bad.forEach(w => { text = text.replace(new RegExp('\\b' + w + '\\b', 'gi'), '***'); });
            return text;
        }

        // Helper function for reliable auto-scrolling
        function scrollToBottom() {
            chatMessages.scrollTop = chatMessages.scrollHeight;
            setTimeout(() => {
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }, 50);
            setTimeout(() => {
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }, 150);
        }

        // *** 🚨 واٹس ایپ کی بورڈ فٹنگ اور ڈائنامک ہائٹ ایڈجسٹمنٹ 🚨 ***
        function adjustViewport() {
            if (window.visualViewport) {
                const height = window.visualViewport.height;
                // باڈی اور ایپ کنٹینر کی ہائٹ کو بالکل دستیاب اسکرین پر فٹ کریں
                document.body.style.height = height + 'px';
                const appContainer = document.getElementById('appContainer');
                if (appContainer) {
                    appContainer.style.height = height + 'px';
                }
                scrollToBottom();
            }
        }

        // جب کی بورڈ کھلے یا بند ہو تو اسکرین خود بخود ایڈجسٹ ہو
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', adjustViewport);
            window.visualViewport.addEventListener('scroll', adjustViewport);
        }

        // ان پٹ باکس پر کلک کرتے ہی اسکرین کو سمٹا دیں
        messageInput.addEventListener('focus', () => {
            setTimeout(adjustViewport, 100);
            setTimeout(scrollToBottom, 300);
        });

        // *** SEND MESSAGE ***
        function sendMessage() {
            if(!currentUser) return alert('Please login first!');
            const text = messageInput.value.trim();
            if(!text) return;

            messageInput.value = '';

            messagesRef.push({
                uid: currentUser.uid,
                name: currentUser.displayName || currentUser.email || 'Guest',
                text: filterBadWords(text),
                timestamp: Date.now()
            }).then(() => {
                scrollToBottom();
            }).catch(err => {
                console.error("Error sending message: ", err);
            });
        }

        let lastSendTime = 0;
        function safeSend(e) {
            e.preventDefault(); 
            
            const now = Date.now();
            if (now - lastSendTime < 300) return; 
            lastSendTime = now;
            
            sendMessage();
        }

        sendBtn.addEventListener('mousedown', safeSend);
        sendBtn.addEventListener('touchstart', safeSend, { passive: false });

        messageInput.addEventListener('keydown', e => { 
            if(e.key === 'Enter') {
                e.preventDefault(); 
                sendMessage(); 
            }
        });
    </script>
</body>
</html>
