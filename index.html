<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta name="description" content="ChitChat Pakistan - Free Online Chat Room">
    <meta name="google-site-verification" content="B1RI6RT1H9T8Ttg5fLtuLiNahDBa-ZOpbkWlnn9HTNk">
    <title>ChitChat Pakistan</title>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #ECE5DD; height: 100dvh; overflow: hidden; transition: 0.3s; }
        
        #loadingScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #075E54; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .spinner { width: 50px; height: 50px; border: 5px solid rgba(255,255,255,0.3); border-top-color: #25D366; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loadingScreen p { color: #fff; font-size: 20px; margin-top: 20px; }
        
        #appContainer { display: none; height: 100dvh; display: flex; flex-direction: column; }
        #mainHeader { background: #075E54; color: #fff; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; height: 60px; }
        .logo-text { font-size: 20px; font-weight: 700; }
        .header-right { display: flex; gap: 12px; align-items: center; }
        .header-right button { background: none; border: none; color: #fff; font-size: 22px; cursor: pointer; }
        .logout-btn { font-size: 14px !important; background: rgba(255,255,255,0.15) !important; padding: 6px 14px !important; border-radius: 20px !important; }
        #onlineUsers { font-size: 13px; background: rgba(255,255,255,0.15); padding: 4px 10px; border-radius: 12px; }
        #onlineCount { font-weight: 700; }

        #authSection { display: flex; align-items: center; justify-content: center; height: calc(100dvh - 60px); background: linear-gradient(135deg, #075E54, #128C7E); padding: 20px; }
        .auth-card { background: #fff; border-radius: 20px; padding: 32px 28px; max-width: 420px; width: 100%; box-shadow: 0 8px 40px rgba(0,0,0,0.15); }
        .auth-card h2 { text-align: center; color: #075E54; margin-bottom: 4px; }
        .subtitle { text-align: center; color: #666; font-size: 14px; margin-bottom: 24px; }
        
        .auth-tabs { display: flex; background: #f0f2f5; border-radius: 12px; padding: 4px; margin-bottom: 24px; }
        .tab-btn { flex: 1; border: none; background: transparent; padding: 10px 0; font-size: 14px; font-weight: 600; color: #666; cursor: pointer; border-radius: 10px; }
        .tab-btn.active { background: #fff; color: #075E54; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }

        #chatContainer { height: calc(100dvh - 60px); display: none; flex-direction: column; background: #E5DDD5; }
        #chatMessages { flex: 1; overflow-y: auto; padding: 16px; touch-action: pan-y; }
        #inputArea { position: sticky; bottom: 0; background: #F0F0F0; padding: 8px 12px; display: flex; gap: 8px; align-items: center; }
        #messageInput { flex: 1; border: none; padding: 10px 16px; border-radius: 24px; font-size: 15px; outline: none; }
        #sendBtn { background: #075E54; color: #fff; border: none; width: 44px; height: 44px; border-radius: 50%; font-size: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="loadingScreen">
        <div class="spinner"></div>
        <p>Loading ChitChat...</p>
    </div>

    <div id="appContainer">
        <div id="mainHeader">
            <div class="logo-text">ChitChat Pakistan</div>
            <div class="header-right">
                <div id="onlineUsers">Online: <span id="onlineCount">0</span></div>
                <button class="logout-btn" id="logoutBtn">Logout</button>
            </div>
        </div>

        <div id="authSection">
            <div class="auth-card">
                <h2>Welcome Back</h2>
                <p class="subtitle">Login to continue chatting</p>
                <div class="auth-tabs">
                    <button class="tab-btn active" id="loginTab">Login</button>
                    <button class="tab-btn" id="signupTab">Signup</button>
                </div>
                <input type="email" id="emailInput" placeholder="Email">
                <input type="password" id="passwordInput" placeholder="Password">
                <input type="text" id="nameInput" placeholder="Display Name" style="display:none;">
                <button id="authBtn">Login</button>
            </div>
        </div>

        <div id="chatContainer">
            <div id="chatMessages"></div>
            <div id="inputArea">
                <input type="text" id="messageInput" placeholder="Type a message">
                <button id="sendBtn">➤</button>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_EMAIL = "admin@chitchat.com";
        
        const firebaseConfig = {
            apiKey: "AIzaSyXXXXXXXXXXXXXXXXXXXXXXXXXXX",
            authDomain: "chitchat-pakistan.firebaseapp.com",
            databaseURL: "https://chitchat-pakistan-default-rtdb.firebaseio.com",
            projectId: "chitchat-pakistan",
            storageBucket: "chitchat-pakistan.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abcdef123456"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();
        const messagesRef = database.ref('messages');
        
        let currentUser = null;
        const messageInput = document.getElementById('messageInput');
        const chatMessages = document.getElementById('chatMessages');
        const sendBtn = document.getElementById('sendBtn');

        // فکس 1: کی بورڈ کو ساکن رکھنے کا visualViewport فکس
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', () => {
                document.getElementById('chatContainer').style.height = window.visualViewport.height + 'px';
                requestAnimationFrame(() => {
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                });
            });
        }

        let isLoginMode = true;
        document.getElementById('loginTab').addEventListener('click', () => {
            isLoginMode = true;
            document.getElementById('loginTab').classList.add('active');
            document.getElementById('signupTab').classList.remove('active');
            document.getElementById('nameInput').style.display = 'none';
            document.getElementById('authBtn').textContent = 'Login';
        });
        
        document.getElementById('signupTab').addEventListener('click', () => {
            isLoginMode = false;
            document.getElementById('signupTab').classList.add('active');
            document.getElementById('loginTab').classList.remove('active');
            document.getElementById('nameInput').style.display = 'block';
            document.getElementById('authBtn').textContent = 'Signup';
        });

        auth.onAuthStateChanged(user => {
            document.getElementById('loadingScreen').style.display = 'none';
            document.getElementById('appContainer').style.display = 'flex';
            
            if (user) {
                currentUser = user;
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('chatContainer').style.display = 'flex';
                
                // فکس 2: Firebase Presence - آن لائن یوزر کاؤنٹ
                const userStatusDatabaseRef = database.ref('/status/' + user.uid);
                const isOfflineForDatabase = {
                    state: 'offline',
                    last_changed: firebase.database.ServerValue.TIMESTAMP,
                };
                const isOnlineForDatabase = {
                    state: 'online',
                    last_changed: firebase.database.ServerValue.TIMESTAMP,
                };

                firebase.database().ref('.info/connected').on('value', function(snapshot) {
                    if (snapshot.val() === false) return;
                    userStatusDatabaseRef.onDisconnect().set(isOfflineForDatabase).then(function() {
                        userStatusDatabaseRef.set(isOnlineForDatabase);
                    });
                });

                database.ref('/status/').orderByChild('state').equalTo('online').on('value', snap => {
                    document.getElementById('onlineCount').textContent = snap.numChildren();
                });

            } else {
                document.getElementById('authSection').style.display = 'flex';
                document.getElementById('chatContainer').style.display = 'none';
            }
        });

        document.getElementById('authBtn').addEventListener('click', () => {
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passwordInput').value;
            const name = document.getElementById('nameInput').value;
            
            if (isLoginMode) {
                auth.signInWithEmailAndPassword(email, password).catch(err => alert(err.message));
            } else {
                auth.createUserWithEmailAndPassword(email, password)
                    .then(cred => cred.user.updateProfile({ displayName: name }))
                    .catch(err => alert(err.message));
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            auth.signOut();
        });
        // فکس 3: میسجز سننا - Smart آٹو سکرول کے ساتھ
        messagesRef.on('child_added', snapshot => {
            const msg = snapshot.val();
            displayMessage(msg);
            
            const isScrolledToBottom = chatMessages.scrollHeight - chatMessages.clientHeight <= chatMessages.scrollTop + 100;
            
            if (isScrolledToBottom) {
                requestAnimationFrame(() => {
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                });
            }
        });

        function displayMessage(msg) {
            const div = document.createElement('div');
            div.style.marginBottom = '8px';
            div.style.padding = '8px 12px';
            div.style.background = '#fff';
            div.style.borderRadius = '8px';
            div.style.maxWidth = '70%';
            div.innerHTML = `<strong>${msg.userName || 'User'}</strong>: ${msg.text}`;
            chatMessages.appendChild(div);
        }

        function sendMessage() {
            const text = messageInput.value.trim();
            if(!text || !currentUser) return;
            
            messagesRef.push({
                text: text,
                userId: currentUser.uid,
                userName: currentUser.displayName || currentUser.email,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });
            
            messageInput.value = '';
            // فکس 4: messageInput.focus() ہٹا دیا - کی بورڈ اب جمپ نہیں کرے گا
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keydown', e => { if(e.key === 'Enter') sendMessage(); });

        // پرانا focus والا کوڈ ہٹا دیا گیا ہے - یہی کی بورڈ جمپ کی وجہ تھی
        // messageInput.addEventListener('focus', function() {
        //     setTimeout(() => {
        //         chatMessages.scrollTop = chatMessages.scrollHeight;
        //     }, 300);
        // });

        chatMessages.style.overflowY = 'auto';
        chatMessages.style.touchAction = 'pan-y';

        console.log("✅ All systems fixed! Admin Email:", ADMIN_EMAIL);
    </script>
</body>
</html>
